# Canonical patient-label mapping config.
# canonical_label: 1 = WORTH_SECOND_LOOK, 0 = NOT_WORTH_SECOND_LOOK

datasets:
  cbis:
    type: "categorical"
    mappings:
      MALIGNANT: 1
      BENIGN: 1
      BENIGN_WITHOUT_CALLBACK: 0

  rsna:
    type: "integer"
    mappings:
      "1": 1
      "0": 0

  vindr:
    # VinDr-Mammo BI-RADS values in breast-level_annotations.csv span 1 through 5
    # (no 0, no 6). The loader parses "BI-RADS N" strings into ints before mapping.
    type: "birads_range"
    positive_min: 4
    positive_max: 5
    negative_min: 1
    negative_max: 3
